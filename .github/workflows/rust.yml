name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - name: Enable sccache wrapper
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache --start-server 2>/dev/null && sccache --show-stats >/dev/null 2>&1; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start — building without cache"
            sccache --stop-server 2>/dev/null || true
          fi

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  check-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libasound2-dev pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - name: Enable sccache wrapper
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache --start-server 2>/dev/null && sccache --show-stats >/dev/null 2>&1; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start — building without cache"
            sccache --stop-server 2>/dev/null || true
          fi

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Check (no default features)
        run: cargo check --no-default-features --verbose

  tag:
    needs: [ build-windows, check-linux ]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.next.outputs.next }}
      tagged: ${{ steps.commit.outputs.tagged }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current Cargo.toml version: $VERSION"

      - name: Compute next patch version
        id: next
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 || echo "")
          echo "Latest tag: ${LATEST_TAG:-none}"

          if [ -z "$LATEST_TAG" ]; then
            NEXT="$CURRENT"
          else
            TAG_VER="${LATEST_TAG#v}"
            MAJOR=$(echo "$TAG_VER" | cut -d. -f1)
            MINOR=$(echo "$TAG_VER" | cut -d. -f2)
            PATCH=$(echo "$TAG_VER" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Update Cargo.toml version
        run: |
          NEXT="${{ steps.next.outputs.next }}"
          sed -i "0,/^version = .*/s//version = \"${NEXT}\"/" Cargo.toml
          echo "Cargo.toml updated to $NEXT"
          head -5 Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Update Cargo.lock
        run: cargo update --package noise-gator

      - name: Commit and tag
        id: commit
        run: |
          NEXT="${{ steps.next.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock

          # Commit version bump if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${NEXT} [skip ci]"
          fi

          # Always tag + push if the tag doesn't already exist
          if git rev-parse "v${NEXT}" >/dev/null 2>&1; then
            echo "Tag v${NEXT} already exists, skipping"
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          else
            git tag "v${NEXT}"
            git push origin master --tags
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          fi

  release-build:
    needs: tag
    if: needs.tag.outputs.tagged == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noise-gator.exe
            ort_platform: win-x64
            ort_ext: zip
            ort_lib: onnxruntime.dll
            platform: windows
            zip_name: noise-gator-windows.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: noise-gator
            ort_platform: osx-x86_64
            ort_ext: tgz
            ort_lib: libonnxruntime.dylib
            platform: macos
            zip_name: noise-gator-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.tag.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
        id: sccache

      - name: Enable sccache wrapper
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache --start-server 2>/dev/null && sccache --show-stats >/dev/null 2>&1; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start — building without cache"
            sccache --stop-server 2>/dev/null || true
          fi

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.platform }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Bundle ONNX Runtime + create release zip
        uses: ./.github/actions/bundle-ort
        with:
          target: ${{ matrix.target }}
          artifact: ${{ matrix.artifact }}
          ort_platform: ${{ matrix.ort_platform }}
          ort_ext: ${{ matrix.ort_ext }}
          ort_lib: ${{ matrix.ort_lib }}
          platform: ${{ matrix.platform }}
          zip_name: ${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: noise-gator-${{ matrix.platform }}
          path: ${{ matrix.zip_name }}

  create-release:
    needs: [ tag, release-build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.tag.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/noise-gator-windows/noise-gator-windows.zip \
            artifacts/noise-gator-macos/noise-gator-macos.zip
