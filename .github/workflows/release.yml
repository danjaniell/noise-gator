name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.3). Defaults to latest tag."
        required: false

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noise-gator.exe
            ort_platform: win-x64
            ort_ext: zip
            ort_lib: onnxruntime.dll
            platform: windows
            zip_name: noise-gator-windows.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: noise-gator
            ort_platform: osx-x86_64
            ort_ext: tgz
            ort_lib: libonnxruntime.dylib
            platform: macos
            zip_name: noise-gator-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.platform }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Bundle ONNX Runtime + create release zip
        uses: ./.github/actions/bundle-ort
        with:
          target: ${{ matrix.target }}
          artifact: ${{ matrix.artifact }}
          ort_platform: ${{ matrix.ort_platform }}
          ort_ext: ${{ matrix.ort_ext }}
          ort_lib: ${{ matrix.ort_lib }}
          platform: ${{ matrix.platform }}
          zip_name: ${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: noise-gator-${{ matrix.platform }}
          path: ${{ matrix.zip_name }}

  create-release:
    needs: [ resolve-tag, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/noise-gator-windows/noise-gator-windows.zip \
            artifacts/noise-gator-macos/noise-gator-macos.zip
