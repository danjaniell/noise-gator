name: Release

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to build (e.g. master, main, release‑v0.1)"
        required: true
        default: "master"

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            target: x86_64-pc-windows-msvc
            ext: .exe
          - platform: macos
            target: x86_64-apple-darwin
            ext: ""
          - platform: linux
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install Rust + cross tool
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build for ${{ matrix.target }}
        run: |
          cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package release artifact
        run: |
          BINARY_DIR=target/${{ matrix.target }}/release
          BINARY_NAME=noise-gator${{ matrix.ext }}
          ZIP_NAME=noise-gator-${{ matrix.platform }}.zip

          cp $BINARY_DIR/noise-gator $BINARY_DIR/$BINARY_NAME
          zip $ZIP_NAME $BINARY_DIR/$BINARY_NAME

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: noise-gator-${{ matrix.platform }}
          path: noise-gator-${{ matrix.platform }}.zip
