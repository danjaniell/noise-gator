name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.3). Defaults to latest tag."
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noise-gator.exe
            platform: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: noise-gator
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Determine ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            TAG="${{ inputs.tag }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=master" >> "$GITHUB_OUTPUT"
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.platform }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: noise-gator-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/noise-gator-windows/noise-gator.exe \
            artifacts/noise-gator-macos/noise-gator
