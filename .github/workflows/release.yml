name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.3). Defaults to latest tag."
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noise-gator.exe
            platform: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: noise-gator
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.platform }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: noise-gator-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  create-release:
    needs: [ resolve-tag, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/noise-gator-windows/noise-gator.exe \
            artifacts/noise-gator-macos/noise-gator
